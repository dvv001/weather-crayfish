<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>虾天气</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- 天气场景画布 -->
    <canvas id="weatherCanvas"></canvas>

    <!-- 定位输入 -->
    <div class="location-bar">
      <button id="locateBtn" title="获取当前位置">📍</button>
      <button id="speakBtn" title="朗读天气">🔊</button>
      <button id="refreshBtn" title="刷新天气">🔄</button>
      <input type="text" id="locationInput" placeholder="输入城市名，如 北京" value="北京">
      <button id="searchBtn">🔍</button>
    </div>

    <!-- 天气信息 -->
    <div class="weather-info">
      <div class="temp" id="temp">--°</div>
      <div class="desc" id="desc">--</div>
      <div class="city" id="city">--</div>
    </div>

    <!-- 角色区域 -->
    <div class="character" id="character">
      <!-- 主角色图 -->
      <img class="char-img" id="charImg" src="icon-192.png" alt="">

      <!-- 天气道具层 -->
      <div class="char-props" id="charProps">
        <span class="prop prop-rain" id="propRain">☂️</span>
        <span class="prop prop-sunscreen" id="propSunscreen">🧴</span>
        <span class="prop prop-thunder" id="propThunder">😨</span>
        <span class="prop prop-snow" id="propSnow">❄️</span>
        <span class="prop prop-tear" id="propTear">💧</span>
        <span class="prop prop-sunglasses" id="propSunglasses">🕶️</span>
      </div>

      <!-- 表情气泡 -->
      <div class="speech-bubble" id="speechBubble"></div>
    </div>

    <!-- 心情文字 -->
    <div class="mood-text" id="moodText">正在感受天气中...</div>

    <!-- 更新时间 -->
    <div class="update-time" id="updateTime"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
