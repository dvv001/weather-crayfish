<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>虾天气</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- 天气场景画布 -->
    <canvas id="weatherCanvas"></canvas>

    <!-- 定位输入 -->
    <div class="location-bar">
      <input type="text" id="locationInput" placeholder="输入城市名，如 北京" value="北京">
      <button id="searchBtn">🔍</button>
    </div>

    <!-- 天气信息 -->
    <div class="weather-info">
      <div class="temp" id="temp">--°</div>
      <div class="desc" id="desc">--</div>
      <div class="city" id="city">--</div>
    </div>

    <!-- 小龙虾角色 -->
    <div class="crayfish" id="crayfish">
      <!-- 身体 -->
      <div class="cf-body">
        <!-- 头部 -->
        <div class="cf-head">
          <!-- 眼睛 -->
          <div class="cf-eye cf-eye-l"></div>
          <div class="cf-eye cf-eye-r"></div>
          <!-- 嘴巴 -->
          <div class="cf-mouth"></div>
        </div>
        <!-- 虾身 -->
        <div class="cf-torso"></div>
        <!-- 大钳子 -->
        <div class="cf-claw cf-claw-l">
          <div class="claw-arm"></div>
          <div class="claw-pincer"></div>
        </div>
        <div class="cf-claw cf-claw-r">
          <div class="claw-arm"></div>
          <div class="claw-pincer"></div>
        </div>
        <!-- 小脚 -->
        <div class="cf-legs">
          <div class="cf-leg"></div>
          <div class="cf-leg"></div>
          <div class="cf-leg"></div>
        </div>
        <!-- 尾巴 -->
        <div class="cf-tail">
          <div class="tail-segment"></div>
          <div class="tail-segment"></div>
          <div class="tail-segment"></div>
          <div class="tail-flipper"></div>
        </div>
      </div>
      <!-- 伞（雨天） -->
      <div class="cf-umbrella" id="umbrella">☂️</div>
      <!-- 防晒霜（晴天） -->
      <div class="cf-sunscreen" id="sunscreen">🧴</div>
      <!-- 乌云（阴天） -->
      <div class="cf-tear" id="tear">💧</div>
    </div>

    <!-- 心情文字 -->
    <div class="mood-text" id="moodText">正在感受天气中...</div>

    <!-- 更新时间 -->
    <div class="update-time" id="updateTime"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
